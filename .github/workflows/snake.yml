name: Generate Snake

on:
  schedule:
    - cron: "30 0 * * *"
    - cron: "30 12 * * *"
  workflow_dispatch:      
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Determine Theme based on Time (IST)
        id: theme
        run: |
          HOUR=$(date -u -d '+5 hours 30 minutes' +%H)
          echo "Current hour in IST: $HOUR"
          
          if [ "$HOUR" -ge 6 ] && [ "$HOUR" -lt 18 ]; then
            echo "It's Day time in India. Using Light theme."
            echo "palette=github-light" >> $GITHUB_OUTPUT 
          else
            echo "It's Night time in India. Using Dark theme."
            echo "palette=github-dark" >> $GITHUB_OUTPUT 
          fi

      - name: Generate Snake Game
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Jaydeep869
          outputs: |
            dist/github-snake.svg?palette=${{ steps.theme.outputs.palette }}
            dist/ocean.gif?color_snake=orange&color_dots=#ff6a00,#ffd60a,#ffaa00,#ff8800,#ffffff


      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
